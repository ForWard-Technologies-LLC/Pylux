name: Build chiaki-ng Appimage x86_64

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build-appimage_x64:
    name: Build chiaki-ng appimage_x64
    runs-on: ubuntu-latest
    
    steps:
      - name: Setup Podman and tools
        run: |
          sudo apt update
          sudo apt-get -y install podman zip

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          path: 'chiaki-ng'

      - name: Add QmlWebEngine Import
        working-directory: chiaki-ng
        run: |
          cp scripts/qtwebengine_import.qml gui/src/qml/
  
      - name: Run build script
        working-directory: chiaki-ng
        run: |
          set -xe
          podman run --rm \
            -v "`pwd`:/build/chiaki" \
            -w "/build/chiaki" \
            --device /dev/fuse \
            --cap-add SYS_ADMIN \
            -t docker.io/streetpea/chiaki-ng-builder:qt6.9 \
            /bin/bash -c "sudo -E scripts/build-appimage.sh /build/appdir"

      - name: Prepare artifacts
        run: |
          cd chiaki-ng/appimage
          # Create zip for Dropbox upload
          zip -r PSStream.zip PSStream
          # Create artifact-ready directory structure for GitHub Actions
          mkdir -p artifact-upload
          cp -r PSStream artifact-upload/
      
      - name: Upload to Dropbox
        continue-on-error: true
        env:
          DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
          DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
          DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
        run: |
          # Get short-lived access token from refresh token
          ACCESS_TOKEN=$(curl -s https://api.dropbox.com/oauth2/token \
            -d refresh_token=$DROPBOX_REFRESH_TOKEN \
            -d grant_type=refresh_token \
            -d client_id=$DROPBOX_APP_KEY \
            -d client_secret=$DROPBOX_APP_SECRET \
            | jq -r '.access_token')
          
          # Upload file
          curl -X POST https://content.dropboxapi.com/2/files/upload \
            --header "Authorization: Bearer $ACCESS_TOKEN" \
            --header "Dropbox-API-Arg: {\"path\": \"/PSStream/PSStream.zip\",\"mode\": \"overwrite\",\"autorename\": false}" \
            --header "Content-Type: application/octet-stream" \
            --data-binary @chiaki-ng/appimage/PSStream.zip
        
      # Upload traditional AppImage
      - name: Upload AppImage Artifact
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: chiaki-ng.AppImage_x86_64
          path: chiaki-ng/appimage/chiaki-ng.AppImage
          if-no-files-found: error
          retention-days: 7

      # Upload PSStream directory (will be zipped by GitHub Actions)
      - name: Upload Steam Portable Linux Artifact
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: PSStream
          path: chiaki-ng/appimage/artifact-upload/
          if-no-files-found: error
          retention-days: 7

      # Create combined release info
      - name: Create build summary
        working-directory: chiaki-ng
        run: |
          echo "## Build Artifacts Created" > build-summary.md
          echo "" >> build-summary.md
          echo "### Traditional Distribution" >> build-summary.md
          echo "- **AppImage**: \`chiaki-ng.AppImage\`" >> build-summary.md
          echo "  - Single file, works on most Linux distributions" >> build-summary.md
          echo "  - Use \`APPIMAGE_EXTRACT_AND_RUN=1\` if Steam has issues" >> build-summary.md
          echo "" >> build-summary.md
          echo "### Steam Distribution (Recommended)" >> build-summary.md
          echo "- **Portable Directory**: \`PSStream.zip\`" >> build-summary.md
          echo "  - Optimized for Steam runtime compatibility" >> build-summary.md
          echo "  - Set executable to: \`linux/launch.sh\`" >> build-summary.md
          echo "  - No launch options needed" >> build-summary.md
          echo "" >> build-summary.md
          echo "### File Sizes" >> build-summary.md
          ls -lh appimage/chiaki-ng.AppImage >> build-summary.md || true
          du -sh appimage/PSStream >> build-summary.md || true
          
      - name: Upload build summary
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: build-summary
          path: chiaki-ng/build-summary.md

