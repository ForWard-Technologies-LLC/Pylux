name: Upload Source Code for AGPL Compliance

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - release/**
    tags:
      - 'v*'
jobs:
  upload-source:
    name: Upload Source Code to Dropbox
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0  # Full history for proper git info

      - name: Create source code archive
        run: |
          # Get build information
          GIT_HASH=$(git rev-parse HEAD)
          GIT_SHORT_HASH=$(git rev-parse --short HEAD)
          BUILD_DATE=$(date +%Y%m%d-%H%M%S)
          ARCHIVE_NAME="chiaki-ng-source-${BUILD_DATE}-${GIT_SHORT_HASH}.tar.gz"
          
          echo "Creating source archive: ${ARCHIVE_NAME}"
          echo "Git commit: ${GIT_HASH}"
          
          # Create comprehensive source archive
          tar -czf "${ARCHIVE_NAME}" \
            --exclude='.git' \
            --exclude='build*' \
            --exclude='appimage' \
            --exclude='build-output' \
            --exclude='*.AppImage' \
            --exclude='*.zip' \
            --exclude='node_modules' \
            --exclude='*.pyc' \
            --exclude='__pycache__' \
            --exclude='.gradle' \
            --exclude='chiaki-build-env' \
            --transform "s,^,chiaki-ng-${GIT_SHORT_HASH}/," \
            .
          
          # Save metadata for later steps
          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> $GITHUB_ENV
          echo "GIT_HASH=${GIT_HASH}" >> $GITHUB_ENV
          echo "GIT_SHORT_HASH=${GIT_SHORT_HASH}" >> $GITHUB_ENV
          echo "BUILD_DATE=${BUILD_DATE}" >> $GITHUB_ENV
          
          # Show archive info
          ls -lh "${ARCHIVE_NAME}"
          echo "Archive size: $(du -h ${ARCHIVE_NAME} | cut -f1)"

      - name: Upload to Dropbox
        env:
          DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
          DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
          DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
        run: |
          # Get short-lived access token from refresh token
          echo "Getting Dropbox access token..."
          ACCESS_TOKEN=$(curl -s https://api.dropbox.com/oauth2/token \
            -d refresh_token=$DROPBOX_REFRESH_TOKEN \
            -d grant_type=refresh_token \
            -d client_id=$DROPBOX_APP_KEY \
            -d client_secret=$DROPBOX_APP_SECRET \
            | jq -r '.access_token')
          
          if [ -z "$ACCESS_TOKEN" ] || [ "$ACCESS_TOKEN" = "null" ]; then
            echo "Error: Failed to get Dropbox access token"
            exit 1
          fi
          
          # Upload source code archive
          echo "Uploading ${ARCHIVE_NAME} to Dropbox..."
          UPLOAD_RESPONSE=$(curl -s -X POST https://content.dropboxapi.com/2/files/upload \
            --header "Authorization: Bearer $ACCESS_TOKEN" \
            --header "Dropbox-API-Arg: {\"path\": \"/chiaki-ng-sources/${ARCHIVE_NAME}\",\"mode\": \"overwrite\",\"autorename\": false}" \
            --header "Content-Type: application/octet-stream" \
            --data-binary @"${ARCHIVE_NAME}")
          
          echo "Upload response: ${UPLOAD_RESPONSE}"
          
          # Check for errors
          if echo "${UPLOAD_RESPONSE}" | jq -e '.error' > /dev/null 2>&1; then
            echo "Error uploading to Dropbox:"
            echo "${UPLOAD_RESPONSE}" | jq '.'
            exit 1
          fi
          
          echo "✓ Source code uploaded successfully to Dropbox"
          
          # Try to create a shared link (may already exist)
          echo "Creating shared link..."
          SHARE_RESPONSE=$(curl -s -X POST https://api.dropboxapi.com/2/sharing/create_shared_link_with_settings \
            --header "Authorization: Bearer $ACCESS_TOKEN" \
            --header "Content-Type: application/json" \
            --data "{\"path\": \"/chiaki-ng-sources/${ARCHIVE_NAME}\",\"settings\":{\"requested_visibility\":\"public\"}}")
          
          # Extract share URL (may fail if link already exists, which is fine)
          SHARE_URL=$(echo "${SHARE_RESPONSE}" | jq -r '.url // empty' 2>/dev/null || echo "")
          
          if [ -n "$SHARE_URL" ]; then
            # Convert to direct download link
            DOWNLOAD_URL="${SHARE_URL//dl=0/dl=1}"
            echo "✓ Share link created: ${DOWNLOAD_URL}"
            echo "DOWNLOAD_URL=${DOWNLOAD_URL}" >> $GITHUB_ENV
          else
            echo "Note: Could not create new share link (may already exist)"
          fi

      - name: Create build info
        run: |
          cat > source-upload-info.txt << EOF
          ================================================================================
          PSStream (chiaki-ng) - Source Code Upload
          ================================================================================
          
          Archive: ${ARCHIVE_NAME}
          Git Commit: ${GIT_HASH}
          Build Date: ${BUILD_DATE}
          Branch/Tag: ${GITHUB_REF_NAME}
          
          The source code has been uploaded to Dropbox at:
            /chiaki-ng-sources/${ARCHIVE_NAME}
          
          This archive will be referenced in binary distributions to comply with
          the GNU Affero General Public License v3.0 (AGPL-3.0) requirements.
          
          ================================================================================
          EOF
          
          cat source-upload-info.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: source-upload-info
          path: source-upload-info.txt
          retention-days: 90

      - name: Summary
        run: |
          echo "## Source Code Upload Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Archive**: \`${ARCHIVE_NAME}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: \`${GIT_SHORT_HASH}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Date**: ${BUILD_DATE}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Source code has been uploaded to Dropbox for AGPL compliance." >> $GITHUB_STEP_SUMMARY

