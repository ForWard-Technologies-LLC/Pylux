name: Build chiaki-ng msys2 x86 Windows

on:
  workflow_dispatch:
  push:
    branches:
      - release/add-windows
    paths:
      - '.github/workflows/build-msys2.yml'
jobs:
  build-windows_x64-msys2:
    name: Build windows msys2 version
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Disable autocrlf
        shell: pwsh
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: msys2/setup-msys2@v2
        with:
          msystem: mingw64
          update: true
          install: git
          pacboy: >-
            ca-certificates:p
            cc:p
            cmake:p
            curl:p
            diffutils:p
            fast_float:p
            fftw:p
            hidapi:p
            json-c:p
            lcms2:p
            libdovi:p
            meson:p
            miniupnpc:p
            gcc:p
            nasm:p
            ninja:p
            openssl:p
            opus:p
            pkgconf:p
            protobuf:p
            python:p
            python-psutil:p
            python-glad:p
            python-jinja:p
            python-pip:p
            qt6-base:p
            qt6-declarative:p
            qt6-svg:p
            SDL2:p
            shaderc:p
            speexdsp:p
            spirv-cross:p
            vulkan:p
            vulkan-headers:p
            
      - name: Install python protobuf and zip
        run: |
          pip install protobuf
          pacman -S git make unzip zip jq --noconfirm

      - name: Build libbplacebo
        run: |
          scripts/build-libplacebo-windows.sh

      - name: Setup ffmpeg
        run: |
          curl -LO https://github.com/streetpea/FFmpeg-Builds/releases/download/latest/ffmpeg-n7.1-latest-win64-gpl-shared-7.1.zip
          unzip ffmpeg-n7.1-latest-win64-gpl-shared-7.1.zip
          cp -a "ffmpeg-n7.1-latest-win64-gpl-shared-7.1/bin/." /mingw64/bin
          cp -a "ffmpeg-n7.1-latest-win64-gpl-shared-7.1/include/." /mingw64/include
          cp -a "ffmpeg-n7.1-latest-win64-gpl-shared-7.1/lib/." /mingw64/lib

      - name: Add QmlWebEngine Import
        run: |
          cp scripts/qtwebengine_import.qml gui/src/qml/

      - name: Configure chiaki-ng
        run: |
          cmake -S . -B build -G "Ninja" -DCMAKE_BUILD_TYPE=Release -DCHIAKI_ENABLE_CLI=OFF -DCHIAKI_ENABLE_STEAMWORKS=ON -DCHIAKI_ENABLE_STEAM_SHORTCUT=ON

      - name: Build chiaki-ng
        run: |
          cmake --build build --config Release --clean-first --target chiaki
          
      - name: Deploy chiaki-ng
        run: |
          mkdir PSStream
          cp build/gui/chiaki.exe PSStream/psstream.exe
          cp third-party/steamworks/steamworks_sdk/redistributable_bin/win64/steam_api64.dll PSStream/
          cp steam_appid.txt PSStream/ 2>/dev/null || echo "Warning: steam_appid.txt not found"
          export PATH="${{ github.workspace }}/build/third-party/cpp-steam-tools:/mingw64/share/qt6/bin/:/mingw64/bin/:${PATH}"
          export QT_PLUGIN_PATH="/mingw64/share/qt6/plugins"
          export QML2_IMPORT_PATH="/mingw64/share/qt6/qml"
          # Recursively find and copy DLL dependencies of psstream.exe
          echo PSStream/psstream.exe > tmp0.txt
          while [ -e tmp0.txt ]
          do
            cp tmp0.txt tmp.txt
            rm tmp0.txt
            sort -u tmp.txt -o tmp.txt
            ldd $(<tmp.txt) | grep -v ":" | cut -d " " -f3 | grep -iv "system32" | grep -iv "not" | xargs -d $'\n' sh -c 'for arg do if [ -n "$arg" ] && [ ! -e "PSStream/${arg##*/}" ]; then echo "Copied $arg"; cp "$arg" PSStream/ ; echo "$arg" >> tmp0.txt; fi; done'
          done
          # Copy Qt plugins and QML modules
          windeployqt6.exe --no-translations --qmldir=gui/src/qml PSStream/psstream.exe
          # Copy dependencies of Qt plugins (windeployqt6 doesn't copy plugin dependencies like libjpeg-8.dll)
          echo "Finding Qt plugin DLLs..."
          find PSStream -type d \( -name plugins -o -name imageformats -o -name platforms -o -name sqldrivers \) -exec find {} -name "*.dll" \; | while read plugin; do
            echo "Found plugin: $plugin"
            echo "$plugin" >> tmp0.txt
          done
          echo "Copying plugin dependencies..."
          while [ -e tmp0.txt ] && [ -s tmp0.txt ]
          do
            cp tmp0.txt tmp.txt
            rm tmp0.txt
            sort -u tmp.txt -o tmp.txt
            ldd $(<tmp.txt) 2>/dev/null | grep -v ":" | cut -d " " -f3 | grep -iv "system32" | grep -iv "not" | xargs -d $'\n' sh -c 'for arg do if [ -n "$arg" ] && [ ! -e "PSStream/${arg##*/}" ]; then echo "  Copying plugin dependency: ${arg##*/}"; cp "$arg" PSStream/ ; echo "$arg" >> tmp0.txt; fi; done'
          done
          rm -f tmp0.txt tmp.txt

      - name: Package chiaki-ng
        run: |
          zip -r PSStream.zip PSStream
          echo "RELEASE_PACKAGE_PATH=PSStream.zip" >> $GITHUB_ENV

      - name: Upload to Dropbox
        continue-on-error: true
        env:
          DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
          DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
          DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
        run: |
          # Get short-lived access token from refresh token
          ACCESS_TOKEN=$(curl -s https://api.dropbox.com/oauth2/token \
            -d refresh_token=$DROPBOX_REFRESH_TOKEN \
            -d grant_type=refresh_token \
            -d client_id=$DROPBOX_APP_KEY \
            -d client_secret=$DROPBOX_APP_SECRET \
            | jq -r '.access_token')
          
          # Upload portable zip file to fixed location
          curl -X POST https://content.dropboxapi.com/2/files/upload \
            --header "Authorization: Bearer $ACCESS_TOKEN" \
            --header "Dropbox-API-Arg: {\"path\": \"/PSStream/windows/PSStream.zip\",\"mode\": \"overwrite\",\"autorename\": false}" \
            --header "Content-Type: application/octet-stream" \
            --data-binary @${{ env.RELEASE_PACKAGE_PATH }}

