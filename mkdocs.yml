site_name: Pylux
repo_url: https://github.com/ForWard-Technologies-LLC/Pylux
site_url: https://forward-technologies-llc.github.io/Pylux/
edit_uri: edit/master/docs
nav:
  - Home: index.md
  - Setup:
    - Setup Overview: setup/index.md
    - Installation: setup/installation.md
    - Configuration: setup/configuration.md
    - Remote Connection: setup/remoteconnection.md
    - Automation: setup/automation.md
    - Game (Mode) Time: setup/steaming.md
    - Controller Options: setup/controlling.md
    - Android: setup/android.md
    - iOS / iPadOS: setup/ios.md
    - Steam Deck: setup/steam-deck.md
    - Windows: setup/windows.md
    - Linux: setup/linux.md
  - Updates:
    - Updates Overview: updates/index.md
    - Releases: updates/releases.md
    - Done: updates/done.md
    - Planned: updates/planned.md
  - DIY:
    - Building for Android: diy/build-android.md
    - Building the Flatpak Yourself: diy/buildit.md
    - Locally Building Documentation: diy/builddocs.md
    - Developing on Steam Deck: diy/steamdeckdev.md

theme:
  favicon: images/pylux-logo.png
  logo: images/pylux-logo.png
  features:
    - header.autohide
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.tracking
    - navigation.footer
    - search.share
    - navigation.indexes
    - announce.dismiss
    - content.tabs.link
    - content.code.copy
    - content.action.edit
    - content.action.view

  name: material
  palette:
    - media: "(prefers-color-scheme: dark)"
      primary: black
      accent: lime
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

    - media: "(prefers-color-scheme: light)"
      primary: black
      accent: lime
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

copyright: >
  Copyright &copy; 2024 ForWard Technologies LLC –
  <a href="#__consent">Change cookie settings</a>

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ForWard-Technologies-LLC/Pylux

  consent:
    title: Cookie consent
    description: >-
      We use cookies to recognize your repeated visits and preferences, as well
      as to measure the effectiveness of our documentation and whether users
      find what they're searching for. With your consent, you're helping us to
      make the documentation better.

markdown_extensions:
  - abbr
  - admonition
  - codehilite
  - footnotes
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.keys
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tilde
  - attr_list
  - tables
  - toc:
      permalink: true
extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true
  - print-site:
      add_to_navigation: true
